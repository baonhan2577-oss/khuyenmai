<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Trang Khuyến Mãi</title>
  <style>
    /* Nút toàn màn hình ở góc trái, z-index cao */
    #fullscreenBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      padding: 8px 12px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    /* Đảm bảo canvas chiếm toàn màn hình */
    #gameCanvas {
      display: block;
      /* Thêm các kiểu khác nếu cần */
    }
  </style>
</head>
<body>
  <!-- Canvas chơi game -->
  <canvas id="gameCanvas"></canvas>

  <!-- Nhạc nền tự động lặp -->
  <audio id="bgmusic" src="nhacnen.mp3" autoplay loop></audio>

  <!-- Hiển thị bộ đếm thời gian -->
  <div id="timer">00:00</div>

  <!-- Nút bật chế độ toàn màn hình -->
  <button id="fullscreenBtn">Toàn màn hình</button>

  <script>
    // Loại bỏ hoặc vô hiệu hóa logic reload khi resize (nếu có)
    // Ví dụ: xóa dòng window.onresize = ... hoặc body onresize.
    
    // Hàm điều chỉnh lại kích thước canvas khi cửa sổ thay đổi
    function resizeCanvas() {
      const canvas = document.getElementById('gameCanvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // Nếu cần, vẽ lại hoặc cập nhật nội dung canvas ở đây
    }
    // Gọi hàm resizeCanvas khi tải trang và khi thay đổi kích thước cửa sổ
    window.addEventListener('load', resizeCanvas);
    window.addEventListener('resize', resizeCanvas);

    // Thiết lập sự kiện click cho nút toàn màn hình
    const fsBtn = document.getElementById('fullscreenBtn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        // Chưa ở toàn màn hình -> bật toàn màn hình
        document.documentElement.requestFullscreen().catch(err => {
          console.error(`Lỗi khi chuyển toàn màn hình: ${err.message}`);
        });
      } else {
        // Đang ở toàn màn hình -> thoát
        document.exitFullscreen();
      }
    });

    // (Tùy chọn) Xử lý khi bật/thoát toàn màn hình
    document.addEventListener('fullscreenchange', () => {
      // Có thể kiểm tra document.fullscreenElement tại đây
      // ví dụ: console.log("Fullscreen:", !!document.fullscreenElement);
      // Không cần reload, chỉ giữ nguyên trạng thái game
    });
  </script>
</body>
</html>
